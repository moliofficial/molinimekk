<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050d1a"/>
      <stop offset="50%" style="stop-color:#071626"/>
      <stop offset="100%" style="stop-color:#0a1f35"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4ff"/>
      <stop offset="100%" style="stop-color:#0066cc"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00b4ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="softblur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <clipPath id="clip">
      <rect width="1200" height="630"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <circle cx="200" cy="315" r="300" fill="#00b4ff" opacity="0.06" filter="url(#blur)"/>
  <circle cx="950" cy="200" r="250" fill="#0044cc" opacity="0.08" filter="url(#blur)"/>
  <circle cx="600" cy="550" r="200" fill="#00b4ff" opacity="0.05" filter="url(#blur)"/>

  <!-- Grid lines -->
  <g stroke="#00b4ff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Left decorative stripe -->
  <rect x="80" y="60" width="3" height="510" fill="url(#accent)" opacity="0.5"/>

  <!-- MOLI logo text -->
  <text x="120" y="230" font-family="'Arial Black', sans-serif" font-size="130" font-weight="900" fill="white" letter-spacing="-4">
    M<tspan fill="#00b4ff">OLI</tspan>
  </text>

  <!-- Tagline -->
  <text x="122" y="288" font-family="'Arial', sans-serif" font-size="26" font-weight="400" fill="#00b4ff" letter-spacing="6" opacity="0.9">STREAMING ANIME SUB INDO</text>

  <!-- Divider -->
  <rect x="122" y="310" width="500" height="2" fill="url(#accent)" opacity="0.6"/>

  <!-- Feature badges -->
  <g transform="translate(122, 345)">
    <!-- Badge 1: Gratis -->
    <rect x="0" y="0" width="140" height="44" rx="22" fill="#00b4ff" fill-opacity="0.12" stroke="#00b4ff" stroke-opacity="0.4" stroke-width="1"/>
    <circle cx="26" cy="22" r="10" fill="none" stroke="#00b4ff" stroke-width="2"/>
    <polygon points="22,17 22,27 30,22" fill="#00b4ff"/>
    <text x="44" y="28" font-family="Arial" font-size="15" font-weight="700" fill="white" letter-spacing="1">GRATIS</text>

    <!-- Badge 2: No Iklan -->
    <rect x="156" y="0" width="150" height="44" rx="22" fill="#00b4ff" fill-opacity="0.12" stroke="#00b4ff" stroke-opacity="0.4" stroke-width="1"/>
    <circle cx="182" cy="22" r="10" fill="none" stroke="#00b4ff" stroke-width="2"/>
    <line x1="175" y1="15" x2="189" y2="29" stroke="#00b4ff" stroke-width="2"/>
    <line x1="189" y1="15" x2="175" y2="29" stroke="#00b4ff" stroke-width="2"/>
    <text x="200" y="28" font-family="Arial" font-size="15" font-weight="700" fill="white" letter-spacing="1">NO IKLAN</text>

    <!-- Badge 3: Update Cepat -->
    <rect x="322" y="0" width="185" height="44" rx="22" fill="#00b4ff" fill-opacity="0.12" stroke="#00b4ff" stroke-opacity="0.4" stroke-width="1"/>
    <circle cx="348" cy="22" r="10" fill="none" stroke="#00b4ff" stroke-width="2"/>
    <path d="M344 18 L348 22 L344 26" fill="none" stroke="#00b4ff" stroke-width="2"/>
    <path d="M348 18 L352 22 L348 26" fill="none" stroke="#00b4ff" stroke-width="2"/>
    <text x="366" y="28" font-family="Arial" font-size="15" font-weight="700" fill="white" letter-spacing="1">UPDATE CEPAT</text>
  </g>

  <!-- URL -->
  <text x="122" y="448" font-family="'Arial', sans-serif" font-size="20" fill="#00b4ff" opacity="0.7" letter-spacing="2">moliflix.vercel.app</text>

  <!-- Right side decorative M -->
  <text x="760" y="520" font-family="'Arial Black', sans-serif" font-size="520" font-weight="900" fill="#00b4ff" opacity="0.035" clip-path="url(#clip)">M</text>

  <!-- Right accent lines -->
  <line x1="1100" y1="60" x2="1180" y2="60" stroke="#00b4ff" stroke-width="2" opacity="0.4"/>
  <line x1="1120" y1="75" x2="1180" y2="75" stroke="#00b4ff" stroke-width="1" opacity="0.2"/>
  <line x1="1100" y1="555" x2="1180" y2="555" stroke="#00b4ff" stroke-width="2" opacity="0.4"/>
  <line x1="1120" y1="540" x2="1180" y2="540" stroke="#00b4ff" stroke-width="1" opacity="0.2"/>

  <!-- Bottom bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)" opacity="0.5"/>
</svg>
