<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#071626"/>
      <stop offset="100%" style="stop-color:#050d1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0088cc"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Top accent stripe -->
  <rect width="64" height="3" rx="1" fill="url(#accent)" opacity="0.8"/>
  <!-- Bolt icon (lightning) -->
  <polygon points="36,6 24,34 32,34 28,58 44,28 35,28 36,6" fill="url(#accent)"/>
  <!-- M lettermark overlay (subtle) -->
  <text x="5" y="56" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" fill="white" opacity="0.12" letter-spacing="-1">MOLI</text>
</svg>
