<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#050d1a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0088cc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="13" fill="none" stroke="url(#blue)" stroke-width="1.5" opacity="0.6"/>
  <rect x="10" y="5" width="44" height="2.5" rx="1.25" fill="url(#blue)" opacity="0.7"/>
  <text x="32" y="46" font-family="Arial Black, Impact, sans-serif" font-size="38" font-weight="900" text-anchor="middle" fill="white" filter="url(#glow)">M</text>
  <rect x="14" y="49" width="36" height="3" rx="1.5" fill="url(#blue)" opacity="0.85"/>
</svg>
